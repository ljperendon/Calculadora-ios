
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>

<body>

<div class="calculator">

  <!-- ICONOS SUPERIORES -->
  <div class="top-bar">

    <!-- Reloj -->
    <div class="icon-circle">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9" stroke="white" stroke-width="1.5" fill="none"/>
        <line x1="12" y1="12" x2="12" y2="7" stroke="white" stroke-width="1.5"/>
        <line x1="12" y1="12" x2="16" y2="12" stroke="white" stroke-width="1.5"/>
      </svg>
    </div>

    <!-- Calculadora -->
    <div class="icon-circle">
      <svg viewBox="0 0 24 24">
        <rect x="5" y="3" width="14" height="18" rx="3" stroke="white" stroke-width="1.5" fill="none"/>
        <circle cx="9" cy="10" r="1" fill="white"/>
        <circle cx="13" cy="10" r="1" fill="white"/>
        <circle cx="17" cy="10" r="1" fill="white"/>
        <circle cx="9" cy="14" r="1" fill="white"/>
        <circle cx="13" cy="14" r="1" fill="white"/>
        <rect x="9" y="17" width="8" height="2" fill="white"/>
      </svg>
    </div>

  </div>

  <!-- DISPLAY -->
  <div id="display">0</div>

  <!-- BOTONES -->
  <div class="buttons">

    <button class="gray">⌫</button>
    <button class="gray">AC</button>
    <button class="gray">%</button>
    <button class="orange">÷</button>

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="orange">×</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="orange">−</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button class="orange">+</button>

    <button>+/-</button>
    <button>0</button>
    <button>.</button>
    <button class="orange">=</button>

  </div>

</div>

<script src="script.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
